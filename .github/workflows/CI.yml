name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - platform: amd64
            runs-on: ubuntu-latest
            docker-arch: ""
          - platform: arm64
            runs-on: ubuntu-latest
            docker-arch: "--platform linux/arm64"
    runs-on: ${{ matrix.runs-on }}

    steps:
    - uses: actions/checkout@v4
    - name: Set standalone env
      uses: ./.github/actions/set_standalone_env
      with:
        build-type: github

    - name: Run Python tests
      run: |
        cd test
        pytest test_vearch.py -x --log-cli-level=INFO
        # test_vearch_document_search_with_index_recall is excluded on arm64 because it runs too slowly on this platform.
        if [[ "${{ matrix.platform }}" == "arm64" ]]; then
          pytest test_document_* -k "not test_vearch_document_upsert_benchmark and not test_vearch_document_search_with_index_recall" -x --log-cli-level=INFO
        else
          pytest test_document_* -k "not test_vearch_document_upsert_benchmark" -x --log-cli-level=INFO
        fi
        # rebuild module tests are exercised by the dedicated CI_rebuild workflow;
        # exclude them here to keep the standalone CI focused and avoid duplicate runs.
        pytest test_module_* -x --log-cli-level=INFO \
          --ignore=test_module_rebuild_smoke.py \
          --ignore=test_module_rebuild_index.py \
          --ignore=test_module_rebuild_comprehensive.py \
          --ignore=test_module_rebuild_chaos.py
        # test_index_rebuild.py exercises the legacy /index/rebuild endpoint
        # that PR 2 removes — the new rebuild path lives under /rebuild/index/...
        # and is covered by CI_rebuild. Keep this disabled until the old
        # test file is rewritten or deleted upstream.
        # if [[ "${{ matrix.platform }}" != "arm64" ]]; then
        #   pytest test_index_rebuild.py -x --log-cli-level=INFO
        # fi

    - name: Test Go SDK
      run: |
        cd sdk/go/test
        go test -v

    - name: Build python sdk
      run: |
        cd sdk/python
        python setup.py bdist_wheel
        pip install dist/pyvearch*

    - name: Test Python SDK
      run: |
        cd sdk/python/test
        pytest -x --log-cli-level=INFO

    - name: Test Benchmark Scripts
      run: |
        cd scripts/benchmarks
        python restful.py
        python pysdk.py --task SEARCH