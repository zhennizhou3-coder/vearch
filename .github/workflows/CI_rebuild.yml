name: CI Rebuild Index

# ---------------------------------------------------------------------------
# 触发条件 + 执行顺序
# ---------------------------------------------------------------------------
# 1) push / pull_request / workflow_dispatch 时触发整条 pipeline。
# 2) rebuild-fast(comprehensive + DiskANN)先跑;通过后 rebuild-chaos
#    (needs: rebuild-fast)接着跑故障注入测试。
#
# 设计权衡:
#   - comprehensive 直接包含 DiskANN,避免单独 -k 跑 DiskANN 时绕过
#     test_prepare_db 造成 db_not_exist。
#   - chaos job 复用同一套 docker-compose 集群:cluster_helpers.py 是双模式的,
#     docker 模式下 kill_ps→`docker kill vearch-psN`、日志走 `docker exec`。
# ---------------------------------------------------------------------------

on:
  push:
  pull_request:
  workflow_dispatch:


jobs:
  rebuild-fast:
    name: 'Rebuild comprehensive tests'
    runs-on: ubuntu-latest
    timeout-minutes: 90     # comprehensive + DiskANN 可能比纯 fast 更久
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            docker-arch: ''
    env:
      TARGET_PLATFORM: ${{ matrix.platform }}

    steps:
    - uses: actions/checkout@v4

    # 复用现有的 cluster setup composite action — 它会:
    # 1) build vearch docker image
    # 2) docker-compose up 一套 3-master / 3-ps / 2-router 集群
    # 3) 装 Python + pytest 依赖
    - uses: ./.github/actions/set_cluster_env
      with:
        build-type: github

    # ---- 模块测试:基础 lifecycle ----
    # test_module_rebuild_index.py 覆盖:
    #   trigger / progress / cancel / 多 target / DB-level / 全局 rebuild
    - name: Run basic rebuild module tests
      run: |
        cd test
        pytest test_module_rebuild_index.py \
          -x --log-cli-level=INFO

    - name: Run comprehensive rebuild tests
      run: |
        cd test
        pytest test_module_rebuild_comprehensive.py \
          -x -rs --log-cli-level=INFO

    # ---- 失败时把 master / PS / router 日志都打上来,debug 方便 ----
    # `if: failure()` 只在前面的 step 挂掉时才跑。
    - name: Upload cluster logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: rebuild-fast-logs
        path: |
          cloud/logs/
          test/*.log
        retention-days: 7

  # ===========================================================================
  # Job B:chaos 测试 — kill PS / master 故障注入
  # ===========================================================================
  # chaos 测试通过 test/utils/cluster_helpers.py 注入故障。该 helper 是双模式
  # 的(bare / docker),docker 模式下 kill_ps→`docker kill vearch-psN`、
  # start_ps→`docker start`、日志走 `docker exec ... cat /vearch/logs/*.log`。
  # 所以这个 job 直接复用 rebuild-fast 的 docker-compose 集群(set_cluster_env),
  # 不再单独 build 裸二进制 + cluster.sh。
  # ---------------------------------------------------------------------------
  rebuild-chaos:
    name: 'Chaos rebuild (PS kill, master failover)'
    needs: rebuild-fast
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            docker-arch: ''
    env:
      TARGET_PLATFORM: ${{ matrix.platform }}
      # cluster_helpers 也会自动探测,显式声明更稳。
      VEARCH_CLUSTER_MODE: docker

    steps:
    - uses: actions/checkout@v4

    # 复用同一套 cluster setup:build 镜像 + docker-compose up 3M/2R/3PS + 装 pytest 依赖。
    - uses: ./.github/actions/set_cluster_env
      with:
        build-type: github

    - name: Run chaos rebuild tests
      # --maxfail=3 收齐多个 failing case 的日志,而不是首发 fail 就退。
      # -p no:cacheprovider 避免 .pytest_cache 堆在 runner 上。
      run: |
        cd test
        pytest test_module_rebuild_chaos.py \
          --maxfail=3 --log-cli-level=INFO \
          -p no:cacheprovider

    - name: Upload chaos logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: rebuild-chaos-logs
        # docker mode 下集群日志在容器内 /vearch/logs/,host 上没有目录;
        # 这里只收 pytest 自身产物。需要容器日志时测试会按需 `docker exec` 拉取。
        path: |
          test/*.log
        retention-days: 14

